name: Android Clochette Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make gradlew executable
        working-directory: android-clochette
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-clochette
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clochette-debug-apk
          path: android-clochette/app/build/outputs/apk/debug/*.apk
