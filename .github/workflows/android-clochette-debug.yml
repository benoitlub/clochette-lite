name: Android Clochette Debug

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate persona JSON assets
        run: python android-clochette/tools/validate_persona_assets.py

      - name: Make gradlew executable
        working-directory: android-clochette
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: android-clochette
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: clochette-debug-apk
          path: android-clochette/app/build/outputs/apk/debug/*.apk
